<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 132" width="1400" height="132" role="img" aria-label="Quote banner style B">
  <defs>
    <linearGradient id="qLineB" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0c1730"/>
      <stop offset="50%" stop-color="#5be7ff"/>
      <stop offset="100%" stop-color="#0c1730"/>
    </linearGradient>

    <linearGradient id="qTextB" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c7f3ff">
        <animate attributeName="stop-color" values="#c7f3ff;#ffffff;#c7f3ff" dur="6.8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#67bbff">
        <animate attributeName="stop-color" values="#67bbff;#d9f4ff;#67bbff" dur="6.8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <linearGradient id="qShimmerB" x1="0%" y1="0%" x2="28%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="46%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="54%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-1.15 0;2.15 0" dur="7.4s" repeatCount="indefinite"/>
    </linearGradient>

    <filter id="qGlowB" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="2.1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="40" y="90" width="1320" height="2" fill="url(#qLineB)"/>
  <rect x="40" y="90" width="1320" height="2" fill="url(#qLineB)" opacity="0.82" filter="url(#qGlowB)">
    <animate attributeName="opacity" values="0.14;0.9;0.14" dur="6.1s" repeatCount="indefinite"/>
  </rect>

  <text
    x="700"
    y="62"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="'Palatino Linotype', 'Book Antiqua', Georgia, serif"
    font-size="42"
    font-style="italic"
    letter-spacing="0.1"
    textLength="1210"
    lengthAdjust="spacingAndGlyphs"
    fill="url(#qTextB)"
    stroke="#f3feff"
    stroke-opacity="0.18"
    stroke-width="0.6"
    paint-order="stroke"
    filter="url(#qGlowB)"
  >
    Yesterday is history, tomorrow is a mystery, but today is a gift. That is why it is called the present.
  </text>

  <text
    x="700"
    y="62"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="'Palatino Linotype', 'Book Antiqua', Georgia, serif"
    font-size="42"
    font-style="italic"
    letter-spacing="0.1"
    textLength="1210"
    lengthAdjust="spacingAndGlyphs"
    fill="url(#qShimmerB)"
    opacity="0.72"
  >
    Yesterday is history, tomorrow is a mystery, but today is a gift. That is why it is called the present.
  </text>
</svg>
