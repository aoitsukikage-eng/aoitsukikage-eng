<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 560" width="1400" height="560" role="img" aria-label="Status core panel v6">
  <defs>
    <linearGradient id="frameStrokeV6" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#173a66"/>
      <stop offset="50%" stop-color="#5be7ff"/>
      <stop offset="100%" stop-color="#173a66"/>
    </linearGradient>
    <linearGradient id="barFillV6" x1="0%" y1="0%" x2="100%" y2="0%">
