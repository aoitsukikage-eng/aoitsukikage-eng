<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 110" width="1400" height="110" role="img" aria-label="Portal links panel header">
  <defs>
    <linearGradient id="panelStrokeD" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#16345e"/>
