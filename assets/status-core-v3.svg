<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 500" width="1400" height="500" role="img" aria-label="Status core panel v3">
  <defs>
    <linearGradient id="frameStrokeV3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#173a66"/>
      <stop offset="50%" stop-color="#5be7ff"/>
      <stop offset="100%" stop-color="#173a66"/>
    </linearGradient>
    <linearGradient id="barFillV3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5be7ff"/>
      <stop offset="100%" stop-color="#75a6ff"/>
    </linearGradient>
    <filter id="dotGlowV3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="1.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="48" y="34" width="1304" height="432" rx="10" fill="#071125" stroke="url(#frameStrokeV3)" stroke-width="2"/>
  <rect x="74" y="62" width="1252" height="376" rx="8" fill="none" stroke="#4bcfff" stroke-opacity="0.42" stroke-width="1.2"/>

  <text x="96" y="98" fill="#93dbff" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="16" letter-spacing="2">STATUS CORE</text>
  <text x="520" y="98" fill="#8fd6ff" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="14" letter-spacing="1.3">LEVEL</text>
  <text x="590" y="98" fill="#d5f3ff" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="18" font-weight="700" letter-spacing="0.5">JUNIOR · UNDERGRAD YEAR 3</text>

  <rect x="1010" y="74" width="286" height="28" rx="5" fill="#0f2444" stroke="#56d0ff" stroke-opacity="0.6" stroke-width="1.1"/>
  <text x="1024" y="93" fill="#84d6ff" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="13" letter-spacing="1.2">TITLE · WARHAMMER 40K</text>

  <line x1="90" y1="120" x2="1310" y2="120" stroke="#58d4ff" stroke-opacity="0.32" stroke-width="1"/>

  <g font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif">
    <text x="96" y="162" fill="#6dbfff" font-size="14" letter-spacing="1.5">GUILD</text>
    <text x="96" y="192" fill="#d5f3ff" font-size="40" font-weight="700">NTPU ESG CENTER</text>

    <text x="760" y="162" fill="#6dbfff" font-size="14" letter-spacing="1.5">CLASS</text>
    <text x="760" y="192" fill="#d5f3ff" font-size="40" font-weight="700">NTPU FINANCE</text>

    <text x="96" y="244" fill="#6dbfff" font-size="14" letter-spacing="1.5">SUB-CLASS</text>
    <text x="96" y="274" fill="#d5f3ff" font-size="36" font-weight="700">RESEARCH ASSISTANT</text>
  </g>

  <g font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif">
    <text x="96" y="322" fill="#74d8ff" font-size="13" letter-spacing="1.4">HP · STAMINA</text>
    <rect x="328" y="312" width="860" height="12" rx="6" fill="#12335e"/>
    <rect x="328" y="312" width="705" height="12" rx="6" fill="url(#barFillV3)">
      <animate attributeName="opacity" values="0.72;1;0.72" dur="4.2s" repeatCount="indefinite"/>
    </rect>
    <circle cx="334" cy="318" r="4.2" fill="#d9fbff" filter="url(#dotGlowV3)">
      <animate attributeName="cx" values="334;1028;334" dur="8.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.25;0.9;0.25" dur="8.8s" repeatCount="indefinite"/>
    </circle>
    <text x="1210" y="322" fill="#aee8ff" font-size="14">82</text>

    <text x="96" y="368" fill="#74d8ff" font-size="13" letter-spacing="1.4">DEF · RISK CONTROL</text>
    <rect x="328" y="358" width="860" height="12" rx="6" fill="#12335e"/>
    <rect x="328" y="358" width="654" height="12" rx="6" fill="url(#barFillV3)">
      <animate attributeName="opacity" values="0.7;0.96;0.7" dur="4.8s" repeatCount="indefinite"/>
    </rect>
    <circle cx="334" cy="364" r="4.2" fill="#d9fbff" filter="url(#dotGlowV3)">
      <animate attributeName="cx" values="334;976;334" dur="9.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.25;0.88;0.25" dur="9.6s" repeatCount="indefinite"/>
    </circle>
    <text x="1210" y="368" fill="#aee8ff" font-size="14">76</text>

    <text x="96" y="414" fill="#74d8ff" font-size="13" letter-spacing="1.4">MP · BUILD FOCUS</text>
    <rect x="328" y="404" width="860" height="12" rx="6" fill="#12335e"/>
    <rect x="328" y="404" width="756" height="12" rx="6" fill="url(#barFillV3)">
      <animate attributeName="opacity" values="0.74;1;0.74" dur="4s" repeatCount="indefinite"/>
    </rect>
    <circle cx="334" cy="410" r="4.2" fill="#d9fbff" filter="url(#dotGlowV3)">
      <animate attributeName="cx" values="334;1080;334" dur="8.1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.95;0.3" dur="8.1s" repeatCount="indefinite"/>
    </circle>
    <text x="1210" y="414" fill="#aee8ff" font-size="14">88</text>
  </g>

  <text x="96" y="448" fill="#78c9ef" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="13" letter-spacing="0.6">
    SYSTEM NOTE: Finance x AI workflow builder focused on deep work, clarity, and risk-aware execution.
  </text>
</svg>
